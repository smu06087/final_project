<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 | IT Control System</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>
<div class="page">
    <div class="wrap">

        <h1>Reset Password</h1>
        <div class="sub">등록된 아이디와 이메일을 입력하시면<br>임시 비밀번호를 메일로 보내드립니다.</div>

        <form class="local-login" th:action="@{/reset-password}" method="post">
            <div class="input-group">
                <label for="providerId">아이디</label>
                <input type="text" id="providerId" name="providerId" 
                       placeholder="가입하신 아이디를 입력하세요" required>
            </div>
            
            <div class="input-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" 
                       placeholder="등록된 이메일 주소를 입력하세요" required>
            </div>
            
            <button type="submit" class="btn-login">임시 비밀번호 발송</button>
            
            <div class="account-helper">
                <div class="helper-item">
                    비밀번호가 생각나셨나요? <a th:href="@{/login}">로그인으로 돌아가기</a>
                </div>
            </div>
        </form>

        <div th:if="${param.error}" style="color: #ff4d4f; font-size: 13px; margin-top: -15px; margin-bottom: 20px;">
            일치하는 계정 정보를 찾을 수 없습니다.
        </div>

        <div class="footer">
            © IT Control System
        </div>

    </div>
</div>
</body>
</html>
