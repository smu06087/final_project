<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정보 수정</title>

<link rel="stylesheet" th:href="@{/css/member/edit.css}">
</head>

<body>
<div class="page">
  <div class="wrap">
    <h1>Edit Profile</h1>
    <div class="badge">정보 수정</div>

    <form th:action="@{/member/edit}" method="post">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" th:value="${member.providerId}" readonly>
        <div class="info-text">※ 아이디는 변경할 수 없습니다.</div>
      </div>

      <div class="form-group">
        <label>새 비밀번호</label>
        <input type="password" name="password" placeholder="변경할 경우에만 입력하세요">
        <div class="info-text">※ 미입력 시 기존 비밀번호가 유지됩니다.</div>
      </div>

      <div class="form-group">
        <label>닉네임</label>
        <input type="text" name="nickname" th:value="${member.nickname}" required placeholder="닉네임을 입력하세요">
      </div>

      <div class="form-group">
        <label>이메일 주소</label>
        <input type="email" name="email" th:value="${member.email}" placeholder="example@email.com">
      </div>

      <div class="btns">
        <button type="button" class="btn btn-cancel" onclick="history.back()">취소</button>
        <button type="submit" class="btn btn-submit">수정 완료</button>
      </div>
    </form>

  </div>
</div>
</body>
</html>
