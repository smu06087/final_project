<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Join | IT Control System</title>
<link rel="stylesheet" th:href="@{/css/join.css}">
</head>
<body>
<div class="wrap">
  <h1>회원가입</h1>
  <form action="/join" method="post">
    <div class="form-group">
      <label>아이디</label>
      <input type="text" name="providerId" placeholder="사용할 아이디를 입력하세요" required>
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
    </div>
    <div class="form-group">
      <label>닉네임</label>
      <input type="text" name="nickname" placeholder="표시될 이름을 입력하세요" required>
    </div>
    <div class="form-group">
      <label>이메일</label>
      <input type="email" name="email" placeholder="example@mail.com">
    </div>
    <button type="submit" class="btn-join">가입하기</button>
  </form>
  <div class="footer">
    이미 계정이 있으신가요? <a href="/login" style="color:#0b41ff; text-decoration:none;">로그인</a>
  </div>
</div>
</body>
</html>
