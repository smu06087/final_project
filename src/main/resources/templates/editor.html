<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Final Project - AI 코딩 에디터 테스트</title>
    <style>
        body { padding: 20px; font-family: 'Malgun Gothic', sans-serif; }
        #wrapper { display: flex; flex-direction: column; gap: 20px; }
        #editor-section { display: flex; flex-direction: column; gap: 10px; }
        #result-section { margin-top: 10px; }
        
        /* 버튼 스타일 */
        .btn-submit {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
            width: 150px;
        }
        .btn-submit:hover { background-color: #45a049; }
        .btn-submit:disabled { background-color: #ccc; cursor: not-allowed; }

        /* 결과 출력창 스타일 (pre 태그 권장) */
        #result-display {
            background-color: #f4f4f4;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            min-height: 100px;
            overflow-x: auto; /* 가로 스크롤 활성화 */
            font-family: 'Consolas', 'Monaco', monospace; /* 코드용 폰트 */
            white-space: pre-wrap; /* 줄바꿈 유지 */
        }
        
        .status-loading { color: blue; font-weight: bold; }
        .status-success { color: green; font-weight: bold; }
        .status-error { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <div id="wrapper">
        <h2>자바 코드 실행 테스트</h2>
        
        <div id="editor-section">
            <p style="margin: 0; color: #666;">※ 클래스 이름은 반드시 <strong>Main</strong>으로 작성해주세요.</p>
            <div id="container" style="width: 100%; height: 400px; border: 1px solid #ddd; border-radius: 4px;"></div>
            
            <button id="submit-btn" class="btn-submit" onclick="submitToServer()">코드 실행</button>
        </div>

        <div id="result-section">
            <h3>실행 결과</h3>
            <pre id="result-display">코드를 작성하고 '코드 실행' 버튼을 눌러주세요.</pre>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    
    <script>
        // 에디터 인스턴스를 담을 변수
        let myEditor;

        // 모나코 에디터 초기화 설정
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        
        require(['vs/editor/editor.main'], function() {
            // 에디터 생성 및 기본 코드 설정
            myEditor = monaco.editor.create(document.getElementById('container'), {
                value: [
                    'public class Main {',
                    '    public static void main(String[] args) {',
                    '        // 화면에 출력할 내용을 작성하세요.',
                    '        System.out.println("Hello com.final_project!");',
                    '    }',
                    '}'
                ].join('\n'),
                language: 'java',       // 언어 설정 (하이라이팅)
                theme: 'vs-dark',       // 테마 설정 (vs, vs-dark, hc-black)
                fontSize: 14,           // 폰트 크기
                automaticLayout: true,  // 창 크기 조절 시 자동 리레이아웃
                minimap: { enabled: true } // 미니맵 활성화
            });
        });

        /**
         * 3. [핵심] 작성된 코드를 서버로 전송하고 결과를 받아오는 함수
         */
        function submitToServer() {
            // 에디터에서 작성된 코드 가져오기
            const codeValue = myEditor.getValue();
            const resultDisplay = document.getElementById('result-display');
            const submitBtn = document.getElementById('submit-btn');

            // 로딩 상태 표시
            resultDisplay.innerHTML = '<span class="status-loading">서버에서 컴파일 및 실행 중입니다... 잠시만 기다려주세요.</span>';
            resultDisplay.className = ''; // 스타일 초기화
            submitBtn.disabled = true;    // 버튼 비활성화 (중복 클릭 방지)

            // 서버 API 호출 (fetch API 사용)
            fetch('/api/run', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json' // JSON 형식으로 데이터 전송
                },
                body: JSON.stringify({ 
                    code: codeValue // 서버의 CodeRequest DTO의 code 필드와 매핑됨
                })
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error('서버 응답 오류 (Status: ' + res.status + ')');
                }
                return res.json(); // 응답 본문을 JSON으로 파싱
            })
            .then(data => {
                // 서버에서 보낸 응답 데이터 처리 ({status: "success/error", result: "..."})
                if (data.status === 'success') {
                    resultDisplay.innerHTML = '<span class="status-success">[실행 성공]</span>\n\n' + data.result;
                } else {
                    resultDisplay.innerHTML = '<span class="status-error">[실행 실패 / 에러]</span>\n\n' + data.result;
                }
            })
            .catch(err => {
                // 통신 실패 등 네트워크 에러 처리
                resultDisplay.innerHTML = '<span class="status-error">[서버 통신 실패]</span>\n\n' + err.message;
            })
            .finally(() => {
                // 요청 완료 후 버튼 다시 활성화
                submitBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
